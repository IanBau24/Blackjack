<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackjack</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">

</head>
<body>
    <header class="title">Blackjack</header>

    <div class="row mt-2">
        <div id="divButton" class="col text-center">
            <button id='btnNewGame'class="btn btn-danger">New Game</button>
            <button id='btnHitMe' class="btn btn-primary">Hit Me</button>
            <button id='btnQuit'class="btn btn-primary">Hold</button>
        </div>
    </div>

    <div class="row">
        <div class="container mt-2">
            <div class="col">
            <h1 class="heading">Player 1 - <small>0</small></h1>
            <div id="player-cards">
                <!-- <img class="card"src="assets/cartas/2H.png" alt=""> -->
            </div>

            <h1 class="heading">Computer - <small>0</small></h1>
            <div id="computer-cards">
                <!-- <img class="card"src="assets/cartas/2S.png" alt=""> -->
            </div>
        </div>
        </div>
        
    </div>
    
    <script src="assets/js/underscore.js"></script>
    <script src="assets/js/game.js"></script>

</html>
